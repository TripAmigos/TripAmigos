<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8f9fb;padding:40px 20px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <tr><td align="center">
    <table width="480" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;border:1px solid #e5e7eb;overflow:hidden;">
      <tr><td style="background:linear-gradient(135deg,#1d4ed8,#2563eb);padding:28px 32px;text-align:center;">
        <span style="font-size:22px;font-weight:600;color:#ffffff;">Trip<span style="opacity:0.9;">Amigos</span></span>
      </td></tr>
      <tr><td style="padding:32px;">
        <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;color:#1a1a2e;">Verification code 🔐</h1>
        <p style="margin:0 0 24px;font-size:15px;color:#6b7280;line-height:1.6;">
          Enter the code below to verify your identity on TripAmigos.
        </p>
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr><td align="center">
            <div style="display:inline-block;padding:16px 40px;background:#f8f9fb;border:2px dashed #d1d5db;border-radius:12px;font-size:32px;font-weight:700;letter-spacing:6px;color:#1a1a2e;font-family:'Courier New',monospace;">
              {{ .Token }}
            </div>
          </td></tr>
        </table>
        <p style="margin:20px 0 0;font-size:13px;color:#9ca3af;text-align:center;line-height:1.5;">
          This code expires in 10 minutes. If you didn't request this, please secure your account by resetting your password.
        </p>
      </td></tr>
      <tr><td style="padding:20px 32px;border-top:1px solid #e5e7eb;text-align:center;">
        <p style="margin:0;font-size:12px;color:#9ca3af;">TripAmigos · Group trips, sorted.</p>
      </td></tr>
    </table>
  </td></tr>
</table>
